<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Analyst Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(26, 139, 178, 0.22), transparent 28%),
        linear-gradient(180deg, #07111a 0%, #102332 100%);
      color: #eaf2f6;
    }
    .card {
      width: min(440px, 92vw);
      background: rgba(247, 244, 238, 0.96);
      color: #102332;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(4, 9, 13, 0.28);
    }
    h1 { margin: 0 0 10px; }
    p { line-height: 1.6; }
    form { display: grid; gap: 14px; margin-top: 18px; }
    label { display: grid; gap: 6px; font-weight: 700; }
    input {
      border: 1px solid rgba(16, 35, 50, 0.16);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      background: linear-gradient(135deg, #ff6d00, #ff9a3c);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    .hint, .error { margin-top: 12px; }
    .hint { color: rgba(16, 35, 50, 0.7); }
    .error {
      border-radius: 12px;
      background: rgba(190, 31, 31, 0.1);
      padding: 12px 14px;
      color: #9f1f1f;
    }
    code { background: rgba(16, 35, 50, 0.08); padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Analyst Access</h1>
    <p>Sign in to access evidence uploads, saved runs, reports, and comparison views.</p>
    <form method="post">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" required />
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <button type="submit">Sign In</button>
    </form>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    {% if show_demo_hint %}
    <div class="hint">
      Default local demo credentials: <code>analyst</code> / <code>correlator123</code>
    </div>
    {% endif %}
  </div>
</body>
</html>
